[Service]
# Use only inside a dedicated disposable VM. This intentionally allows Claw
# subprocesses to install packages and modify that VM's operating system.
NoNewPrivileges=false
ProtectSystem=false
PrivateTmp=false
ProtectKernelTunables=false
ProtectKernelModules=false
ProtectControlGroups=false
RestrictSUIDSGID=false
LockPersonality=false
ReadWritePaths=
